name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-tur poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests (no OCR deps)
        run: |
          pytest test_user_manager.py test_luca_export.py test_beyanname_takvimi.py test_e_fatura_sorgu.py test_beyanname_email.py test_pdf_extract.py test_eksik.py -v --tb=short --cov=. --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run OCR tests (with system deps)
        run: |
          pytest test_ocr_pipeline.py test_ogrenme.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --select E,F,W --ignore E501,W503
