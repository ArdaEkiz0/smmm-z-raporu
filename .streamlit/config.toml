[theme]
base = "light"
primaryColor = "#0F766E"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#0F172A"
font = "sans serif"

[server]
headless = true
runOnSave = false
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 25
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
caching = true
showErrorDetails = false
toolbarMode = "minimal"

[global]
developmentMode = false
logLevel = "info"

[runner]
# Fast reruns: widget state korunur, script tekrar çalıştırılır
fastReruns = true
