services:
  - type: web
    name: smmm-z-raporu
    runtime: python
    buildCommand: apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-tur && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless=true --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
